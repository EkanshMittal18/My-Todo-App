<!DOCTYPE html>
<html>
<head>
  <title>Personal Information</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Personal Information</h2>

<div class="info-box">

  <!-- EMAIL (READ ONLY) -->
  <div class="info-row">
    <label>Email</label>
    <input type="email" id="user-email" disabled>
  </div>

  <!-- NAME -->
  <div class="info-row">
    <label>Name</label>
    <input type="text" id="user-name" disabled>
    <button id="edit-name-btn">Edit</button>
  </div>

  <!-- SAVE -->
  <button id="save-name-btn" disabled>Save Changes</button>

</div>

</body>
</html>
